apiVersion: apps/v1
kind: Deployment
metadata:
  name: kfirs-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kfirs-app
      component: kfirs-app
  template:
    metadata:
      labels:
        app: kfirs-app
        component: kfirs-app
    spec:
      containers:
        - name: kfirs-app
          image: kfire312/kfirs-app:v2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: kfirs-app-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: kfirs-app-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: kfirs-app-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: kfirs-app-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kfirs-app-secrets
                  key: POSTGRES_PASSWORD
            - name: APP_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: kfirs-app-config
                  key: APP_USERNAME
            - name: APP_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: kfirs-app-secrets
                  key: APP_PASSWORD_HASH
            - name: FLASK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: kfirs-app-secrets
                  key: FLASK_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /api/auth
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/auth
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

